<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Universe OneTime</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
}

/* INFO */
#movie{
  text-align:center;
  padding:20px;
}

#movie img{
  width:70%;
  max-width:250px;
  border-radius:12px;
}

button{
  padding:12px 20px;
  margin-top:15px;
  border:none;
  border-radius:10px;
  background:red;
  color:white;
}

/* COUNTDOWN */
#countdown{
  margin-top:10px;
  font-size:14px;
  color:#ccc;
}

/* PLAYER */
#player{
  display:none;
  position:relative;
  height:100vh;
  background:black;
}

video{
  width:100%;
  height:100%;
}

/* CONTROLLI */
#controls{
  position:absolute;
  bottom:0;
  width:100%;
  padding:15px;
  background:linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

#bigPlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:60px;
}

input[type=range]{
  width:60%;
}
</style>

</head>

<body>

<!-- FILM -->
<div id="movie">
  <img id="cover">
  <h2 id="title"></h2>
  <p id="year"></p>
  <p id="director"></p>

  <div id="countdown"></div>

  <button onclick="play()">▶ Esegui</button>
</div>

<!-- PLAYER -->
<div id="player">
  <video id="video"></video>

  <div id="bigPlay" onclick="togglePlay()">▶</div>

  <div id="controls">
    <button onclick="togglePlay()">▶</button>
    <input type="range" id="progress" value="0">
    <span id="time">0:00</span>
    <button onclick="fullscreen()">⛶</button>
  </div>
</div>

<script>
const DURATION = 24 * 60 * 60 * 1000;

/* DATABASE - INSERISCI QUI I TUOI DATI */
const DATABASE = {

"AGS20183":{
  title:"Les Choristes",
  year:"2004",
  director:"Gérard Jugnot",
  cover:"media.themoviedb.org/t/p/w220_and_h330_face/56rhPkUkswFM5ocmvudC25fWvYK.jpg",
  video:"https://www.mediafire.com/file/ify55rbpnkq4mmk/The+Chorus.mp4/file"
},

"GM021834":{
title:"Les Choristes",
  year:"2004",
  director:"Gérard Jugnot",
  cover:"media.themoviedb.org/t/p/w220_and_h330_face/56rhPkUkswFM5ocmvudC25fWvYK.jpg",
  video:"https://www.mediafire.com/file/ify55rbpnkq4mmk/The+Chorus.mp4/file"
},

"GBCE10293":{
title:"Les Choristes",
  year:"2004",
  director:"Gérard Jugnot",
  cover:"media.themoviedb.org/t/p/w220_and_h330_face/56rhPkUkswFM5ocmvudC25fWvYK.jpg",
  video:"https://www.mediafire.com/file/ify55rbpnkq4mmk/The+Chorus.mp4/file"
},

"T3ST4PL4Y":{
title:"Les Choristes",
  year:"2004",
  director:"Gérard Jugnot",
  cover:"media.themoviedb.org/t/p/w220_and_h330_face/56rhPkUkswFM5ocmvudC25fWvYK.jpg",
  video:"https://www.mediafire.com/file/ify55rbpnkq4mmk/The+Chorus.mp4/file"
}

};

const code = localStorage.getItem("uot_code");
const start = localStorage.getItem("uot_time");

if(!code || !start || !DATABASE[code]){
  location.href="index.html";
}

if(Date.now()-start > DURATION){
  localStorage.clear();
  alert("Accesso scaduto");
  location.href="index.html";
}

const data = DATABASE[code];

document.getElementById("cover").src = data.cover;
document.getElementById("title").innerText = data.title;
document.getElementById("year").innerText = "Anno: "+data.year;
document.getElementById("director").innerText = "Regista: "+data.director;

/* COUNTDOWN */
function countdown(){
  const remaining = DURATION - (Date.now()-start);

  if(remaining<=0){
    localStorage.clear();
    location.href="index.html";
    return;
  }

  const h=Math.floor(remaining/3600000);
  const m=Math.floor((remaining%3600000)/60000);
  const s=Math.floor((remaining%60000)/1000);

  document.getElementById("countdown").innerText =
  "Tempo rimasto: "+h+"h "+m+"m "+s+"s";
}

setInterval(countdown,1000);
countdown();

/* PLAYER */
const video=document.getElementById("video");
const progress=document.getElementById("progress");
const time=document.getElementById("time");
const bigPlay=document.getElementById("bigPlay");

function play(){
  document.getElementById("movie").style.display="none";
  document.getElementById("player").style.display="block";
  video.src=data.video;
}

function togglePlay(){
  if(video.paused){
    video.play();
    bigPlay.style.display="none";
  }else{
    video.pause();
    bigPlay.style.display="block";
  }
}

video.addEventListener("timeupdate",()=>{
  progress.value=(video.currentTime/video.duration)*100;

  const m=Math.floor(video.currentTime/60);
  const s=Math.floor(video.currentTime%60);

  time.innerText=m+":"+(s<10?"0":"")+s;
});

progress.addEventListener("input",()=>{
  video.currentTime=(progress.value/100)*video.duration;
});

function fullscreen(){
  video.requestFullscreen();
}
</script>

</body>
</html>
